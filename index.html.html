<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Viatris Live관 참석자 Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#f1f5f9;--white:#fff;--border:#e2e8f0;--border2:#cbd5e1;
  --blue:#1d4ed8;--blue-md:#3b82f6;--blue-lt:#dbeafe;--blue-xl:#eff6ff;
  --indigo:#4338ca;--ind-lt:#e0e7ff;
  --green:#047857;--grn-lt:#d1fae5;
  --amber:#b45309;--amb-lt:#fef3c7;
  --purple:#6d28d9;--pur-lt:#ede9fe;
  --teal:#0e7490;--tel-lt:#cffafe;
  --orange:#c2410c;--org-lt:#ffedd5;
  --kakao:#f8e000;--kakao-dk:#3a1c1c;--kakao-bg:#fffde7;--kakao-bd:#f0d000;
  --text:#0f172a;--t2:#1e293b;--t3:#475569;--t4:#94a3b8;--t5:#e2e8f0;
  --r:10px;--r-sm:6px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Plus Jakarta Sans',sans-serif;font-size:13px;line-height:1.6;min-height:100vh;}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 55%,#2563eb 100%);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.hdr-l{display:flex;align-items:center;gap:12px;}
.hdr-ico{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.hdr-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;color:#fff;}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;}
.hdr-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.ch-w{background:rgba(255,255,255,.18);color:#fff;}
.ch-g{background:rgba(52,211,153,.28);color:#6ee7b7;}
.ch-k{background:rgba(248,224,0,.3);color:#fde68a;}

/* ── DROP ZONE ── */
.drop-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 70px);padding:32px;}
.drop-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px;text-align:center;}
.drop-sub{font-size:13px;color:var(--t3);margin-bottom:36px;text-align:center;}
.drop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%;max-width:900px;margin-bottom:28px;}
@media(max-width:700px){.drop-grid{grid-template-columns:1fr;}}
.drop-zone{background:var(--white);border:2px dashed var(--border2);border-radius:var(--r);padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--blue);background:var(--blue-xl);}
.drop-zone.loaded{border-color:var(--green);border-style:solid;background:var(--grn-lt);}
.drop-zone.loaded .dz-icon{color:var(--green);}
.dz-icon{font-size:32px;margin-bottom:10px;display:block;}
.dz-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:800;color:var(--t2);margin-bottom:4px;}
.dz-hint{font-size:11px;color:var(--t4);line-height:1.5;}
.dz-loaded-name{font-size:11px;color:var(--green);font-weight:700;margin-top:6px;word-break:break-all;}
.dz-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:10;}
.dz-rows{font-size:10px;color:var(--t4);margin-top:3px;}
.drop-run-btn{background:var(--blue);color:#fff;border:none;border-radius:var(--r);padding:14px 40px;font-size:14px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px;}
.drop-run-btn:hover{background:#1e40af;}
.drop-run-btn:disabled{background:var(--t5);color:var(--t4);cursor:not-allowed;}
.drop-note{font-size:11px;color:var(--t4);margin-top:12px;text-align:center;}
.progress-bar{width:100%;max-width:400px;height:4px;background:var(--border);border-radius:2px;margin-top:16px;overflow:hidden;display:none;}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;width:0%;}

/* ── MAIN DASHBOARD ── */
.dashboard{display:none;}
.top-bar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.top-info{font-size:11px;color:var(--t3);display:flex;gap:12px;flex-wrap:wrap;}
.top-info span{display:flex;align-items:center;gap:4px;}
.reset-btn{padding:5px 14px;border:1px solid var(--border2);border-radius:5px;font-size:11px;font-weight:700;color:var(--t3);background:var(--white);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .12s;}
.reset-btn:hover{border-color:var(--blue);color:var(--blue);}

/* VIEW TABS */
.view-tabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;display:flex;}
.vt-btn{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;padding:11px 16px;border:none;background:transparent;color:var(--t4);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.vt-btn:hover{color:var(--t2);}
.vt-btn.active{color:var(--blue);border-bottom-color:var(--blue);}
.vt-badge{background:var(--blue-lt);color:var(--blue);padding:1px 6px;border-radius:99px;font-size:10px;font-weight:800;}
.vt-btn.active .vt-badge{background:var(--blue);color:#fff;}

/* MAIN */
.main{padding:18px 32px;max-width:1500px;margin:0 auto;}
.view-panel{display:none;} .view-panel.active{display:block;}

/* KPI */
.krow{display:grid;grid-template-columns:repeat(6,1fr);gap:11px;margin-bottom:18px;}
@media(max-width:1200px){.krow{grid-template-columns:repeat(3,1fr);}}
.kc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;box-shadow:var(--sh);position:relative;overflow:hidden;}
.kc-s{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;}
.kc-i{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;margin-bottom:7px;}
.kc-v{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;line-height:1;margin-bottom:2px;letter-spacing:-0.5px;}
.kc-l{font-size:11px;color:var(--t3);font-weight:500;}
.kc-sub{font-size:10px;color:var(--t4);margin-top:1px;}
.kc.kakao-kpi{border-color:var(--kakao-bd);background:var(--kakao-bg);}
.kc.kakao-kpi .kc-v{color:var(--kakao-dk);}

/* SECTION LABEL */
.sl{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--t4);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sl::after{content:'';flex:1;height:1px;background:var(--border);}

.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);margin-bottom:14px;}
.ch{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.ch-note{font-size:10px;color:var(--t4);font-weight:400;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{text-align:left;font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--t4);padding:7px 10px;border-bottom:2px solid var(--border);white-space:nowrap;}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--t3);vertical-align:middle;}
.tbl tr:hover td{background:#fafcff;}
.num{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;color:var(--text);}
.rb{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;margin-right:2px;}
.r1{background:#fef3c7;color:#92400e;}.r2{background:#f1f5f9;color:#475569;}.r3{background:#fff7ed;color:#9a3412;}.rn{background:#f8fafc;color:#94a3b8;}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;}
.t-a{background:var(--amb-lt);color:var(--amber);}
.t-b{background:var(--blue-lt);color:var(--blue);}
.t-c{background:var(--grn-lt);color:var(--green);}
.t-spec{background:var(--ind-lt);color:var(--indigo);}
.t-terr{background:var(--tel-lt);color:var(--teal);}
.t-ok{background:#f8fafc;color:var(--t3);border:1px solid var(--border2);font-family:monospace;font-size:10px;}
.t-fuzzy{background:var(--org-lt);color:var(--orange);border:1px solid #fed7aa;font-size:9px;}
.t-alias{background:#fdf2f8;color:#9d174d;border:1px solid #fbcfe8;font-size:9px;}
.tag-kakao{display:inline-flex;align-items:center;background:none;border:none;padding:0 1px;}
.tag-kakao-no{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;background:#f1f5f9;color:var(--t4);border:1px solid var(--border);}

/* REP VIEW */
.g2{display:grid;grid-template-columns:260px 1fr;gap:14px;align-items:start;}
@media(max-width:900px){.g2{grid-template-columns:1fr;}}
.rep-panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;position:sticky;top:14px;max-height:calc(100vh - 120px);display:flex;flex-direction:column;}
.rep-ph{padding:10px 13px;border-bottom:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;flex-shrink:0;}
.rep-filter{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:5px;}
.rep-filter input{width:100%;padding:6px 10px;border:1px solid var(--border2);border-radius:5px;font-size:12px;font-family:inherit;color:var(--text);outline:none;}
.rep-filter input:focus{border-color:var(--blue-md);}
.filter-btns{display:flex;gap:4px;}
.filter-btn{flex:1;padding:3px 4px;border:1px solid var(--border2);border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;background:var(--white);color:var(--t3);font-family:'Plus Jakarta Sans',sans-serif;transition:all .12s;text-align:center;}
.filter-btn:hover{border-color:var(--blue-md);color:var(--blue);}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.filter-btn.kf.active{background:var(--kakao);border-color:var(--kakao-bd);color:var(--kakao-dk);}
.rep-items{overflow-y:auto;flex:1;}
.rep-item{padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:7px;transition:background .12s;}
.rep-item:hover{background:var(--blue-xl);}
.rep-item.active{background:var(--blue-lt);border-left:3px solid var(--blue);}
.rep-item.active .ri-name{color:var(--blue);}
.ri-l{flex:1;min-width:0;}
.ri-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:var(--t2);}
.ri-sub{font-size:10px;color:var(--t4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ri-r{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.ri-count{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:800;color:var(--blue);}
.ri-bs{display:flex;gap:2px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.b-a{padding:1px 5px;border-radius:99px;font-size:9px;font-weight:800;background:var(--amb-lt);color:var(--amber);}
.b-b{padding:1px 5px;border-radius:99px;font-size:9px;font-weight:800;background:var(--blue-lt);color:var(--blue);}
.b-c{padding:1px 5px;border-radius:99px;font-size:9px;font-weight:800;background:var(--grn-lt);color:var(--green);}
.b-k{padding:1px 4px;border-radius:99px;font-size:9px;font-weight:800;background:var(--kakao);color:var(--kakao-dk);display:flex;align-items:center;gap:2px;}

/* DETAIL */
.detail{display:flex;flex-direction:column;gap:11px;}
.empty-st{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:55px 20px;text-align:center;box-shadow:var(--sh);}
.dp-head{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;box-shadow:var(--sh);}
.dp-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:800;color:var(--text);margin-bottom:5px;}
.dp-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--t3);}
.dp-v{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;color:var(--text);}

/* HCP CARD */
.hcp-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;transition:box-shadow .15s;}
.hcp-card:hover{box-shadow:var(--sh-md);}
.hcp-card.p-a{border-left:4px solid var(--amber);}
.hcp-card.p-b{border-left:4px solid var(--blue-md);}
.hcp-card.p-c{border-left:4px solid var(--green);}
.hcp-top{padding:12px 15px;display:flex;align-items:flex-start;gap:11px;cursor:pointer;}
.hcp-top:hover{background:#fafcff;}
.hcp-pri{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px;}
.pri-a{background:var(--amb-lt);color:var(--amber);}
.pri-b{background:var(--blue-lt);color:var(--blue);}
.pri-c{background:var(--grn-lt);color:var(--green);}
.hcp-info{flex:1;min-width:0;}
.hcp-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:800;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.hcp-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:4px;}
.hcp-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.ses-n{font-family:'Plus Jakarta Sans',sans-serif;font-size:19px;font-weight:800;color:var(--blue);line-height:1;}
.ses-l{font-size:9px;color:var(--t4);font-weight:700;text-transform:uppercase;}
.mini-bs{display:flex;align-items:flex-end;gap:2px;height:19px;}
.mini-b{width:6px;border-radius:2px 2px 0 0;}
.exp-btn{font-size:13px;color:var(--t4);transition:transform .2s;}
.exp-btn.open{transform:rotate(180deg);}

.hcp-body{display:none;border-top:1px solid var(--border);}
.hcp-body.open{display:grid;grid-template-columns:1fr 1fr;gap:0;}
@media(max-width:680px){.hcp-body.open{grid-template-columns:1fr;}}
.hb-sec{padding:12px 15px;}
.hb-sec:nth-child(odd){border-right:1px solid var(--border);}
.hb-sec:nth-child(n+3){border-top:1px solid var(--border);}
.hb-t{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--t4);margin-bottom:8px;}
.wbi-r{padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;display:flex;align-items:flex-start;gap:6px;}
.wbi-r:last-child{border:none;}
.wbi-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.wbi-t{color:var(--t2);line-height:1.4;word-break:keep-all;}
.wbi-m{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;color:var(--t4);font-weight:600;white-space:nowrap;}
.ta-c{display:inline-flex;align-items:center;padding:1px 6px;border-radius:99px;font-size:10px;font-weight:700;margin:2px;}
.mbar-wrap{display:flex;gap:3px;margin-top:5px;align-items:flex-end;height:28px;}
.mbar-c{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;}
.mbar{width:100%;border-radius:2px 2px 0 0;}
.mbar-l{font-size:8px;color:var(--t4);font-weight:600;text-align:center;}
.mbar-v{font-size:9px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;text-align:center;min-height:10px;}
.cs-row{display:flex;gap:6px;margin-top:7px;}
.cs-i{flex:1;text-align:center;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 2px;}
.cs-v{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:800;}
.cs-l{font-size:9px;color:var(--t4);font-weight:600;text-transform:uppercase;margin-top:1px;}
.fu-box{background:linear-gradient(135deg,var(--blue-xl),var(--ind-lt));border:1px solid #bfdbfe;border-radius:var(--r-sm);padding:9px 12px;margin-top:7px;}
.fu-t{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:800;color:var(--blue);margin-bottom:5px;}
.fu-a{display:flex;align-items:flex-start;gap:6px;padding:3px 0;border-bottom:1px solid rgba(29,78,216,.08);font-size:11px;color:var(--t2);line-height:1.5;}
.fu-a:last-child{border:none;}
.fu-n{width:15px;height:15px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-size:8px;font-weight:800;flex-shrink:0;margin-top:2px;}
.kakao-box{background:var(--kakao-bg);border:1px solid var(--kakao-bd);border-radius:var(--r-sm);padding:9px 12px;margin-top:6px;}
.kakao-box-t{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:800;color:var(--kakao-dk);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.kakao-row{display:flex;gap:5px;flex-wrap:wrap;}
.kakao-item{background:var(--white);border:1px solid var(--kakao-bd);border-radius:5px;padding:3px 7px;font-size:10px;color:var(--kakao-dk);font-weight:600;}
.kakao-item span{color:var(--t4);font-weight:400;margin-right:3px;}
.no-kakao-box{background:#f8fafc;border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 11px;margin-top:6px;font-size:11px;color:var(--t3);}

/* DISTRICT VIEW */
.dist-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
@media(max-width:1100px){.dist-grid{grid-template-columns:repeat(2,1fr);}}
.dist-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;cursor:pointer;transition:box-shadow .18s,transform .15s;}
.dist-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px);}
.dist-card.selected{border-color:var(--blue);box-shadow:0 0 0 2px rgba(29,78,216,.15);}
.dist-top{padding:12px 15px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--blue-xl),#fff);}
.dist-num{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
.dist-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:var(--text);}
.dist-stats{padding:10px 14px;display:flex;gap:0;}
.ds-i{flex:1;text-align:center;border-right:1px solid var(--border);}
.ds-i:last-child{border:none;}
.ds-v{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;line-height:1;}
.ds-l{font-size:9px;color:var(--t4);font-weight:700;text-transform:uppercase;margin-top:2px;}
.ds-i.ks{background:var(--kakao-bg);}
.ds-i.ks .ds-v{color:var(--kakao-dk);}
.dist-pbar{height:3px;display:flex;overflow:hidden;}
.dist-pa{background:var(--amber);} .dist-pb{background:var(--blue-md);} .dist-pc{background:var(--green);}
.dist-detail{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);padding:16px 18px;margin-bottom:14px;display:none;}
.dist-detail.open{display:block;}
.dist-dh{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.dist-close{font-size:16px;color:var(--t4);cursor:pointer;}
.drg{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;}
.drc{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 13px;}
.drc-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.drc-rep{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:var(--text);}
.drc-t{font-size:10px;color:var(--t4);}
.drc-hcp{background:var(--white);border:1px solid var(--border);border-radius:5px;padding:8px 10px;margin-bottom:6px;}
.drc-hcp.p-a{border-left:3px solid var(--amber);}
.drc-hcp.p-b{border-left:3px solid var(--blue-md);}
.drc-hcp.p-c{border-left:3px solid var(--green);}
.drc-hcp.has-k{border-right:3px solid var(--kakao);}
.drc-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:5px;}
.drc-meta{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;}
.drc-ok{font-family:monospace;font-size:10px;color:var(--t4);background:var(--bg);border:1px solid var(--border);padding:1px 4px;border-radius:3px;}
.drc-fu{margin-top:5px;padding:6px 9px;background:var(--blue-xl);border:1px solid #bfdbfe;border-radius:4px;font-size:11px;}
.drc-fu-t{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;font-weight:800;color:var(--blue);margin-bottom:3px;}

.save-btn{padding:5px 14px;border:none;border-radius:5px;font-size:11px;font-weight:700;color:#fff;background:var(--blue);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px;}
.save-btn:hover{background:#1e40af;}
.wbi-info{flex:1;min-width:0;}
.wbi-spk{font-size:10px;color:var(--t3);margin-top:1px;display:flex;align-items:center;gap:3px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

function rRL(){var q=(document.getElementById('rs')?document.getElementById('rs').value:'').trim();var qn=q.replace(/\s/g,''),qm=q.replace(/[^0-9]/g,'');var rs=Object.values(rD);if(q)rs=rs.filter(function(r){if(r.rep.replace(/\s/g,'').includes(qn))return true;if(qm){var tn=r.territory.replace(/[^0-9]/g,'');if(tn===qm||tn.endsWith(qm))return true;}return false;});if(rF==='a')rs=rs.filter(function(r){return r.priorityA>0});if(rF==='kk')rs=rs.filter(function(r){return r.kakaoCount>0});if(rF==='nk')rs=rs.filter(function(r){return r.hcps.some(function(h){return!h.kakao})});rs.sort(function(a,b){return b.priorityA-a.priorityA||b.totalSessions-a.totalSessions});document.getElementById('ri').innerHTML=rs.map(function(r){return'<div class="rep-item'+(r.rep===cR?' active':'')+'" data-r="'+r.rep+'" onclick="sRd(this)"><div class="ri-l"><div class="ri-name">'+r.rep+'</div><div class="ri-sub">'+r.territory+' · '+sh(r.hospital)+'</div></div><div class="ri-r"><div class="ri-count">'+r.totalHcp+'명</div><div class="ri-bs">'+(r.priorityA?'<span class="b-a">A'+r.priorityA+'</span>':'')+(r.priorityB?'<span class="b-b">B'+r.priorityB+'</span>':'')+(r.priorityC?'<span class="b-c">C'+r.priorityC+'</span>':'')+(r.kakaoCount?'<span class="b-k">'+KI(10)+r.kakaoCount+'</span>':'')+'</div></div></div>';}).join('');}
function rDG(){document.getElementById('dg').innerHTML=dD.map(function(d){var t=d.totalHcp||1,ap=Math.round(d.priorityA/t*100),bp=Math.round(d.priorityB/t*100);return'<div class="dist-card'+(d.district===cDist?' selected':'')+'" data-d="'+d.district+'" onclick="sDd(this)"><div class="dist-top"><div class="dist-num">District '+d.district+'</div><div class="dist-name">'+d.label+'</div></div><div class="dist-pbar"><div class="dist-pa" style="width:'+ap+'%"></div><div class="dist-pb" style="width:'+bp+'%"></div><div class="dist-pc" style="width:'+(100-ap-bp)+'%"></div></div><div class="dist-stats"><div class="ds-i"><div class="ds-v" style="color:var(--blue)">'+d.totalHcp+'</div><div class="ds-l">HCP</div></div><div class="ds-i"><div class="ds-v" style="color:var(--amber)">'+d.priorityA+'</div><div class="ds-l">Prio A</div></div><div class="ds-i"><div class="ds-v" style="color:var(--t3)">'+d.totalSessions+'</div><div class="ds-l">참석</div></div><div class="ds-i ks"><div class="ds-v">'+d.kakaoCount+'</div><div class="ds-l">'+KI(10)+'</div></div></div></div>';}).join('');}
function sDist(dn){cDist=dn;rDG();var dist=dD.find(function(d){return d.district===dn});if(!dist)return;var det=document.getElementById('dd');det.classList.add('open');var rc=dist.reps.map(function(rn){var r=rD[rn];if(!r)return'';var hh=r.hcps.map(function(h){var ac=fuA(h);return'<div class="drc-hcp p-'+h.priority.toLowerCase()+(h.kakao?' has-k':'')+'" ><div class="drc-name"><span class="hcp-pri pri-'+h.priority.toLowerCase()+'" style="width:22px;height:22px;font-size:10px">'+h.priority+'</span>'+h.name+' '+(h.kakao?KI(14):'')+' </div><div class="drc-meta"><span class="tag t-spec">'+h.specialty+'</span><span class="tag" style="background:#f8fafc;color:var(--t2)">'+sh(h.hospitalTF)+'</span><span class="drc-ok">'+h.onekey+'</span></div><div style="text-align:right;margin-bottom:4px"><span style="font-size:14px;font-weight:800;color:var(--blue)">'+h.totalSessions+'</span><span style="font-size:10px;color:var(--t4);"> 건</span></div><div class="drc-fu"><div class="drc-fu-t">⚡ F/U 액션</div>'+ac.slice(0,2).map(function(a,i){return'<div style="display:flex;gap:4px;margin-bottom:2px;font-size:10px"><div style="width:13px;height:13px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;flex-shrink:0">'+(i+1)+'</div><div>'+a+'</div></div>';}).join('')+'</div></div>';}).join('');return'<div class="drc"><div class="drc-h"><div><div class="drc-rep">'+r.rep+'</div><div class="drc-t">'+r.territory+' · '+sh(r.hospital)+'</div></div><div style="display:flex;gap:3px;">'+(r.priorityA?'<span class="b-a">A'+r.priorityA+'</span>':'')+(r.priorityB?'<span class="b-b">B'+r.priorityB+'</span>':'')+(r.priorityC?'<span class="b-c">C'+r.priorityC+'</span>':'')+(r.kakaoCount?'<span class="b-k">'+KI(9)+r.kakaoCount+'</span>':'')+'</div></div>'+hh+'</div>';}).join('');det.innerHTML='<div class="dist-dh"><div>District '+dist.district+' — <span style="color:var(--t3)">'+dist.label+'</span> <span class="tag t-a">A '+dist.priorityA+'</span> <span class="tag t-b">B '+dist.priorityB+'</span> <span class="tag t-c">C '+dist.priorityC+'</span>'+(dist.kakaoCount?' <span style="display:inline-flex;align-items:center;gap:3px">'+KI(12)+' '+dist.kakaoCount+'명</span>':'')+'</div><div class="dist-close" onclick="cDist2()">✕</div></div><div class="drg">'+rc+'</div>';det.scrollIntoView({behavior:'smooth',block:'nearest'});}
function cDist2(){cDist=null;rDG();document.getElementById('dd').classList.remove('open');}
function rWT(){document.getElementById('wt').innerHTML='<thead><tr><th>순</th><th>웨비나명</th><th>카테고리</th><th>HCP</th><th>Prio A</th><th>Prio B</th><th>날짜</th></tr></thead><tbody>'+wR.map(function(d,i){var rc=i<1?'r1':i<2?'r2':i<3?'r3':'rn';var c=TAC[d.ta]||'#64748b',bg=TAB[d.ta]||'#f1f5f9';var sn=d.name.length>52?d.name.slice(0,52)+'…':d.name;return'<tr><td><span class="rb '+rc+'">'+(i+1)+'</span></td><td style="font-size:11px;color:var(--t2);" title="'+d.name+'">'+sn+'</td><td><span class="tag" style="background:'+bg+';color:'+c+'">'+d.ta+'</span></td><td class="num">'+d.hcpCount+'명</td><td><span class="tag t-a">A '+d.a+'</span></td><td><span class="tag t-b">B '+d.b+'</span></td><td style="font-size:11px;color:var(--t4);">'+String(d.date).slice(0,10)+'</td></tr>';}).join('')+'</tbody>';}

function sRd(el){sR(el.dataset.r);}
function sDd(el){sDist(el.dataset.d);}
function init(){var ah=Object.values(rD).reduce(function(a,r){return a.concat(r.hcps)},[]);var tm=new Set(ah.map(function(h){return h.onekey})).size;var tk=ah.filter(function(h){return h.kakao}).length;document.getElementById('v-sub').textContent='생성: '+mt.generatedAt+' | 기간: '+mt.webinarPeriod;document.getElementById('v-chips').innerHTML='<span class="chip ch-w">매칭 '+tm+'명</span><span class="chip ch-g">담당자 '+Object.keys(rD).length+'명</span><span class="chip ch-k">'+KI(12)+' 카카오 '+tk+'명</span>';document.getElementById('v-meta').innerHTML='<strong>Viatris Live관 참석자 Dashboard</strong> | 기간: '+mt.webinarPeriod+' | 매칭: '+tm+'명 | 생성: '+mt.generatedAt;document.getElementById('vb-rep').textContent=Object.keys(rD).length+'명';document.getElementById('vb-dist').textContent=dD.length+'개';document.getElementById('vb-web').textContent=wR.length+'개';document.getElementById('v-krow').innerHTML='<div class="kc"><div class="kc-s" style="background:var(--blue)"></div><div class="kc-i" style="background:#dbeafe">🎯</div><div class="kc-v" style="color:var(--blue)">'+tm+'명</div><div class="kc-l">확인된 매칭 HCP</div></div><div class="kc"><div class="kc-s" style="background:var(--amber)"></div><div class="kc-i" style="background:#fef3c7">⭐</div><div class="kc-v" style="color:var(--amber)">'+ah.filter(function(h){return h.priority==="A"}).length+'명</div><div class="kc-l">Priority A</div></div><div class="kc"><div class="kc-s" style="background:var(--blue-md)"></div><div class="kc-i" style="background:#dbeafe">🔵</div><div class="kc-v" style="color:var(--blue-md)">'+ah.filter(function(h){return h.priority==="B"}).length+'명</div><div class="kc-l">Priority B</div></div><div class="kc"><div class="kc-s" style="background:var(--green)"></div><div class="kc-i" style="background:#d1fae5">🟢</div><div class="kc-v" style="color:var(--green)">'+ah.filter(function(h){return h.priority==="C"}).length+'명</div><div class="kc-l">Priority C</div></div><div class="kc kakao-kpi"><div class="kc-s" style="background:var(--kakao)"></div><div class="kc-i" style="background:rgba(248,224,0,.3)">'+KI(16)+'</div><div class="kc-v">'+tk+'명</div><div class="kc-l">카카오 가입</div><div class="kc-sub">'+Math.round(tk/tm*100||0)+'%</div></div><div class="kc"><div class="kc-s" style="background:#94a3b8"></div><div class="kc-i" style="background:#f1f5f9">□</div><div class="kc-v" style="color:var(--t3)">'+(tm-tk)+'명</div><div class="kc-l">카카오 미가입</div></div>';rRL();rDG();rWT();var top=Object.values(rD).sort(function(a,b){return b.priorityA-a.priorityA||b.totalSessions-a.totalSessions})[0];if(top)setTimeout(function(){sR(top.rep);},80);}
document.addEventListener('DOMContentLoaded',init);
</script>
